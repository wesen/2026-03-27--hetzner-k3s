apiVersion: apps/v1
kind: Deployment
metadata:
  name: goja-essay
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: goja-essay
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: goja-essay
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goja-essay
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      containers:
        - name: goja-essay
          image: ghcr.io/go-go-golems/go-go-goja:sha-ebaf324
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/essay/sections/meet-a-session
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/essay/sections/meet-a-session
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: goja-essay-data
