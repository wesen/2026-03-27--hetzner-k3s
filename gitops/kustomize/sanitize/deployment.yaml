apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanitize
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: sanitize
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sanitize
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sanitize
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      containers:
        - name: sanitize
          image: ghcr.io/go-go-golems/sanitize:sha-cebe68d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
