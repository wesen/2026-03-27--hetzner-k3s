apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: draft-review-postgres-admin
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: draft-review-db-bootstrap
  mount: kv
  type: kv-v2
  path: infra/postgres/cluster
  refreshAfter: 30s
  destination:
    name: draft-review-postgres-admin
    create: true
    overwrite: true
