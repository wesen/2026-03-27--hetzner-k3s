apiVersion: v1
kind: Service
metadata:
  name: demo-stack-app
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: demo-stack
    app.kubernetes.io/component: app
spec:
  selector:
    app.kubernetes.io/name: demo-stack
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
