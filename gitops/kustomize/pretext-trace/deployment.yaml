apiVersion: apps/v1
kind: Deployment
metadata:
  name: pretext-trace
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: pretext-trace
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pretext-trace
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pretext-trace
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      serviceAccountName: pretext-trace
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: pretext-trace
          image: ghcr.io/wesen/2026-03-30--pretext-wasm-trace-server:sha-fd700a6
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3037"
          ports:
            - containerPort: 3037
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
