apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: primary
spec:
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      protocol: TCP
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: primary
