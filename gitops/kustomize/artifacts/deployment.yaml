apiVersion: apps/v1
kind: Deployment
metadata:
  name: serve-artifacts
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: serve-artifacts
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: serve-artifacts
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: serve-artifacts
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      containers:
        - name: serve-artifacts
          image: ghcr.io/wesen/2026-03-29--serve-claude-experiments:sha-c2f7237
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
