apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: smailnail-ghcr-pull
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: smailnail
  mount: kv
  type: kv-v2
  path: apps/smailnail/prod/image-pull
  refreshAfter: 30s
  destination:
    name: smailnail-ghcr-pull
    create: true
    overwrite: true
    type: kubernetes.io/dockerconfigjson
    transformation:
      excludes:
        - ".*"
      templates:
        .dockerconfigjson:
          text: |
            {"auths":{"{{ .Secrets.server }}":{"username":"{{ .Secrets.username }}","password":"{{ .Secrets.password }}","auth":"{{ .Secrets.auth }}"}}}
