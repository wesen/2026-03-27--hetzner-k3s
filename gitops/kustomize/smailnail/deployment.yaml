apiVersion: apps/v1
kind: Deployment
metadata:
  name: smailnail
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: smailnail
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smailnail
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smailnail
        app.kubernetes.io/component: app
    spec:
      enableServiceLinks: false
      serviceAccountName: smailnail
      containers:
        - name: smailnail
          image: ghcr.io/go-go-golems/smailnail:sha-151bc29
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SMAILNAILD_LISTEN_HOST
              value: 0.0.0.0
            - name: SMAILNAILD_LISTEN_PORT
              value: "8080"
            - name: SMAILNAILD_LOG_LEVEL
              value: info
            - name: SMAILNAILD_DSN
              valueFrom:
                secretKeyRef:
                  name: smailnail-runtime
                  key: dsn
            - name: SMAILNAILD_ENCRYPTION_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: smailnail-runtime
                  key: encryption_key_id
            - name: SMAILNAILD_ENCRYPTION_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: smailnail-runtime
                  key: encryption_key_base64
            - name: SMAILNAILD_AUTH_MODE
              value: oidc
            - name: SMAILNAILD_AUTH_SESSION_COOKIE_NAME
              value: smailnail_session
            - name: SMAILNAILD_OIDC_ISSUER_URL
              value: https://auth.yolo.scapegoat.dev/realms/smailnail
            - name: SMAILNAILD_OIDC_CLIENT_ID
              value: smailnail-web
            - name: SMAILNAILD_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smailnail-runtime
                  key: oidc_client_secret
            - name: SMAILNAILD_OIDC_REDIRECT_URL
              value: https://smailnail.yolo.scapegoat.dev/auth/callback
            - name: SMAILNAILD_OIDC_SCOPES
              value: openid,profile,email
            - name: SMAILNAILD_MCP_ENABLED
              value: "1"
            - name: SMAILNAILD_MCP_TRANSPORT
              value: streamable_http
            - name: SMAILNAILD_MCP_AUTH_MODE
              value: external_oidc
            - name: SMAILNAILD_MCP_AUTH_RESOURCE_URL
              value: https://smailnail.yolo.scapegoat.dev/mcp
            - name: SMAILNAILD_MCP_OIDC_ISSUER_URL
              value: https://auth.yolo.scapegoat.dev/realms/smailnail
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
