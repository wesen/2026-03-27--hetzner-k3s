apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: smailnail-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: smailnail
  mount: kv
  type: kv-v2
  path: apps/smailnail/prod/runtime
  refreshAfter: 30s
  destination:
    name: smailnail-runtime
    create: true
    overwrite: true
