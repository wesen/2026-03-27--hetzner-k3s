apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: mysql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: primary
spec:
  ports:
    - name: mysql
      port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: primary
