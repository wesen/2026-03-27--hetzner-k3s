apiVersion: apps/v1
kind: Deployment
metadata:
  name: hair-booking
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: hair-booking
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hair-booking
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hair-booking
        app.kubernetes.io/component: app
    spec:
      enableServiceLinks: false
      serviceAccountName: hair-booking
      containers:
        - name: hair-booking
          image: ghcr.io/wesen/hair-booking:sha-fbbdc78
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HAIR_BOOKING_LISTEN_HOST
              value: 0.0.0.0
            - name: HAIR_BOOKING_LISTEN_PORT
              value: "8080"
            - name: HAIR_BOOKING_AUTO_MIGRATE
              value: "true"
            - name: HAIR_BOOKING_STORAGE_MODE
              value: local
            - name: HAIR_BOOKING_STORAGE_LOCAL_DIR
              value: /data/uploads
            - name: HAIR_BOOKING_PUBLIC_BASE_URL
              value: https://hair-booking.yolo.scapegoat.dev
            - name: HAIR_BOOKING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: dsn
            - name: HAIR_BOOKING_AUTH_MODE
              value: oidc
            - name: HAIR_BOOKING_AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: session_secret
            - name: HAIR_BOOKING_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: oidc_issuer_url
            - name: HAIR_BOOKING_OIDC_CLIENT_ID
              value: hair-booking-web
            - name: HAIR_BOOKING_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: oidc_client_secret
            - name: HAIR_BOOKING_OIDC_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: oidc_redirect_url
            - name: HAIR_BOOKING_STYLIST_ALLOWED_EMAILS
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: stylist_allowed_emails
            - name: HAIR_BOOKING_STYLIST_ALLOWED_SUBJECTS
              valueFrom:
                secretKeyRef:
                  name: hair-booking-runtime
                  key: stylist_allowed_subjects
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hair-booking-data
