apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wesen-os

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: wesen-os-config
    files:
      - config/profiles.runtime.yaml
      - config/federation.registry.json

generatorOptions:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
