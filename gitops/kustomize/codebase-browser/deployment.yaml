apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebase-browser
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: codebase-browser
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codebase-browser
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codebase-browser
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      containers:
        - name: codebase-browser
          image: ghcr.io/wesen/codebase-browser:sha-90ad40a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/index
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/index
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
