apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-hair-booking-smtp-sync
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: keycloak-hair-booking-smtp-sync
    app.kubernetes.io/component: smtp-reconciler
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-hair-booking-smtp-sync
            app.kubernetes.io/component: smtp-reconciler
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          serviceAccountName: keycloak-hair-booking-smtp-sync
          containers:
            - name: reconciler
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /usr/local/bin/python3
                - /reconcile/reconcile.py
              env:
                - name: KEYCLOAK_BASE_URL
                  value: http://keycloak
                - name: KEYCLOAK_REALM
                  value: hair-booking
                - name: KEYCLOAK_ADMIN_CLIENT_ID
                  value: admin-cli
                - name: KEYCLOAK_ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-bootstrap-admin
                      key: username
                - name: KEYCLOAK_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-bootstrap-admin
                      key: password
                - name: KUBERNETES_API_URL
                  value: https://kubernetes.default.svc
                - name: KUBERNETES_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: KUBERNETES_BEARER_TOKEN_FILE
                  value: /var/run/secrets/kubernetes.io/serviceaccount/token
                - name: KUBERNETES_CA_CERT
                  value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                - name: SMTP_STATE_CONFIGMAP
                  value: keycloak-hair-booking-smtp-sync-state
                - name: SMTP_SECRET_PATH
                  value: kv/apps/hair-booking/prod/ses
                - name: KEYCLOAK_SMTP_HOST
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: host
                - name: KEYCLOAK_SMTP_PORT
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: port
                - name: KEYCLOAK_SMTP_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: username
                - name: KEYCLOAK_SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: password
                - name: KEYCLOAK_SMTP_FROM
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: from_address
                - name: KEYCLOAK_SMTP_FROM_DISPLAY_NAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: from_name
                - name: KEYCLOAK_SMTP_REPLY_TO
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: reply_to
                - name: KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: from_name
                - name: KEYCLOAK_SMTP_STARTTLS
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: starttls
                - name: KEYCLOAK_SMTP_SSL
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-hair-booking-smtp
                      key: ssl
              volumeMounts:
                - name: reconcile-script
                  mountPath: /reconcile
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: reconcile-script
              configMap:
                name: keycloak-hair-booking-smtp-sync
                defaultMode: 0555
