apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keycloak-bootstrap-admin
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: keycloak
  mount: kv
  type: kv-v2
  path: apps/keycloak/prod/bootstrap-admin
  refreshAfter: 30s
  destination:
    name: keycloak-bootstrap-admin
    create: true
    overwrite: true
