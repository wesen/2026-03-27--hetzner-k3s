apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-db-bootstrap
  namespace: keycloak
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-db-bootstrap
        app.kubernetes.io/component: bootstrap
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      serviceAccountName: keycloak-db-bootstrap
      containers:
        - name: bootstrap
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /bootstrap/bootstrap.sh
          env:
            - name: POSTGRES_SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-admin
                  key: service-host
            - name: POSTGRES_SERVICE_PORT
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-admin
                  key: service-port
            - name: POSTGRES_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-admin
                  key: postgres-user
            - name: POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-admin
                  key: postgres-password
            - name: KEYCLOAK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-runtime
                  key: database
            - name: KEYCLOAK_DB_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-runtime
                  key: username
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-runtime
                  key: password
          volumeMounts:
            - name: bootstrap-script
              mountPath: /bootstrap
              readOnly: true
      volumes:
        - name: bootstrap-script
          configMap:
            name: keycloak-db-bootstrap-script
            defaultMode: 0555
