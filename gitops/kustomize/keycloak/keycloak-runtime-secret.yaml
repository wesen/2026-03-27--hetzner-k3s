apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keycloak-runtime
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: keycloak
  mount: kv
  type: kv-v2
  path: apps/keycloak/prod/database
  refreshAfter: 30s
  destination:
    name: keycloak-runtime
    create: true
    overwrite: true
