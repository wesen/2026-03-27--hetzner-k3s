apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keycloak-postgres-admin
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  vaultAuthRef: keycloak-db-bootstrap
  mount: kv
  type: kv-v2
  path: infra/postgres/cluster
  refreshAfter: 30s
  destination:
    name: keycloak-postgres-admin
    create: true
    overwrite: true
