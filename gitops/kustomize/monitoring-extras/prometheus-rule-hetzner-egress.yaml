apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hetzner-egress
  labels:
    app.kubernetes.io/name: hetzner-egress
spec:
  groups:
    - name: hetzner-egress.rules
      rules:
        - alert: HighHetznerEgress24h
          expr: |
            sum(increase(node_network_transmit_bytes_total{device="eth0"}[24h]))
              > 500 * 1024 * 1024 * 1024
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High outbound traffic in the last 24h"
            description: "Cluster sent more than 500 GiB via eth0 in the last 24h."

        - alert: VeryHighHetznerEgressRate
          expr: |
            sum(rate(node_network_transmit_bytes_total{device="eth0"}[15m])) * 8
              > 200 * 1000 * 1000
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Sustained high outbound bandwidth"
            description: "Cluster is sending more than 200 Mbit/s via eth0 for 30m."
