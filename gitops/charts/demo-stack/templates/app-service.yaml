apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-stack.fullname" . }}-app
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  selector:
    app.kubernetes.io/name: {{ include "demo-stack.name" . }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
