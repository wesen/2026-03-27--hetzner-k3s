{{- if .Values.argocd.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-public
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer.name | quote }}
    {{- with .Values.argocd.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: argocd
spec:
  ingressClassName: {{ .Values.argocd.ingressClassName | quote }}
  tls:
    - hosts:
        - {{ .Values.argocd.host | quote }}
      secretName: {{ .Values.argocd.tlsSecretName }}
  rules:
    - host: {{ .Values.argocd.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: http
{{- end }}
