apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-stack.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: {{ include "demo-stack.name" . }}
    app.kubernetes.io/component: postgres
