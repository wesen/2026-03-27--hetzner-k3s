apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mysql
    targetRevision: 14.0.5
    helm:
      releaseName: mysql
      values: |
        fullnameOverride: mysql
        architecture: standalone

        auth:
          existingSecret: mysql-auth
          createDatabase: true
          database: gec
          username: coinvault_ro

        serviceAccount:
          create: true
          name: mysql

        primary:
          persistence:
            enabled: true
            storageClass: local-path
            size: 20Gi
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi

        metrics:
          enabled: false

        extraDeploy:
          - apiVersion: secrets.hashicorp.com/v1beta1
            kind: VaultConnection
            metadata:
              name: vault-connection
              namespace: {{ .Release.Namespace }}
              annotations:
                argocd.argoproj.io/sync-wave: "-1"
            spec:
              address: http://vault.vault.svc.cluster.local:8200
              skipTLSVerify: true
          - apiVersion: secrets.hashicorp.com/v1beta1
            kind: VaultAuth
            metadata:
              name: mysql
              namespace: {{ .Release.Namespace }}
              annotations:
                argocd.argoproj.io/sync-wave: "-1"
            spec:
              vaultConnectionRef: vault-connection
              method: kubernetes
              mount: kubernetes
              kubernetes:
                role: mysql
                serviceAccount: mysql
          - apiVersion: secrets.hashicorp.com/v1beta1
            kind: VaultStaticSecret
            metadata:
              name: mysql-auth
              namespace: {{ .Release.Namespace }}
              annotations:
                argocd.argoproj.io/sync-wave: "-1"
            spec:
              vaultAuthRef: mysql
              mount: kv
              type: kv-v2
              path: infra/mysql/cluster
              refreshAfter: 30s
              destination:
                name: mysql-auth
                create: true
                overwrite: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
