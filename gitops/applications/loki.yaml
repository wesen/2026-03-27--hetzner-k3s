apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.3
    helm:
      releaseName: loki
      valuesObject:
        loki:
          enabled: true
          persistence:
            enabled: true
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            size: 10Gi
          config:
            limits_config:
              retention_period: 168h
            table_manager:
              retention_deletes_enabled: true
              retention_period: 168h
        promtail:
          enabled: true
          config:
            snippets:
              pipelineStages:
                - cri: {}
                - match:
                    selector: '{namespace="kube-system", app_kubernetes_io_name="traefik"}'
                    stages:
                      - replace:
                          expression: '(request_[^"]*(?:Token|Authorization|Cookie|Secret)[^"]*":"?)[^",}]+'
                          replace: '${1}REDACTED'
        grafana:
          enabled: false
        prometheus:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
